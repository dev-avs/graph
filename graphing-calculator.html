<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphing Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 300px;
  min-width: 260px;
  background: #181825;
  border-right: 1px solid #313244;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 14px 16px;
  background: #11111b;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #313244;
}

.logo-icon {
  font-size: 22px;
  color: #cba6f7;
  line-height: 1;
}

#sidebar-header h1 {
  font-size: 17px;
  font-weight: 700;
  color: #cba6f7;
  letter-spacing: 0.5px;
}

#equations-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

#equations-list::-webkit-scrollbar { width: 4px; }
#equations-list::-webkit-scrollbar-thumb { background: #313244; border-radius: 4px; }

.eq-item {
  display: flex;
  align-items: stretch;
  background: #1e1e2e;
  border-radius: 10px;
  margin-bottom: 8px;
  border: 1.5px solid #313244;
  overflow: hidden;
  transition: border-color 0.15s;
  position: relative;
}

.eq-item:focus-within {
  border-color: var(--eq-color, #cba6f7);
}

.eq-swatch {
  width: 10px;
  min-width: 10px;
  background: var(--eq-color, #cba6f7);
  cursor: pointer;
  position: relative;
  transition: filter 0.2s;
}
.eq-swatch:hover { filter: brightness(1.3); }
.eq-swatch input[type=color] {
  opacity: 0;
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.eq-body {
  flex: 1;
  padding: 8px 10px;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.eq-label {
  font-size: 11px;
  color: #6c7086;
  user-select: none;
}

.eq-row {
  display: flex;
  align-items: center;
  gap: 4px;
}

.eq-prefix {
  font-size: 14px;
  color: #6c7086;
  font-family: 'Courier New', monospace;
  user-select: none;
}

.eq-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #cdd6f4;
  font-size: 14px;
  font-family: 'Courier New', monospace;
  min-width: 0;
}

.eq-input::placeholder { color: #45475a; }

.eq-error {
  font-size: 11px;
  color: #f38ba8;
  font-family: 'Courier New', monospace;
}

.eq-actions {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.eq-vis-btn, .eq-del-btn {
  padding: 0 8px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  opacity: 0.5;
  transition: opacity 0.15s;
  align-self: center;
  height: 24px;
  display: flex;
  align-items: center;
}
.eq-vis-btn:hover { opacity: 1; color: #a6e3a1; }
.eq-del-btn:hover { opacity: 1; color: #f38ba8; }
.eq-item.hidden .eq-vis-btn { opacity: 0.3; }

#add-btn {
  margin: 4px 8px 8px;
  padding: 9px;
  background: transparent;
  border: 1.5px dashed #45475a;
  border-radius: 10px;
  color: #7f849c;
  cursor: pointer;
  font-size: 13px;
  text-align: center;
  transition: all 0.15s;
}
#add-btn:hover {
  border-color: #cba6f7;
  color: #cba6f7;
  background: rgba(203,166,247,0.05);
}

#hint-box {
  padding: 12px 14px;
  border-top: 1px solid #313244;
  font-size: 11.5px;
  color: #585b70;
  line-height: 1.7;
}

#hint-box strong { color: #7f849c; }

/* ── Graph area ── */
#graph-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #1e1e2e;
}

canvas#graph {
  display: block;
  cursor: crosshair;
}

#coords-display {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(17,17,27,0.85);
  padding: 5px 11px;
  border-radius: 8px;
  font-size: 12.5px;
  font-family: 'Courier New', monospace;
  color: #7f849c;
  pointer-events: none;
  backdrop-filter: blur(4px);
}

#zoom-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.zoom-btn {
  width: 32px;
  height: 32px;
  background: rgba(17,17,27,0.85);
  border: 1px solid #313244;
  border-radius: 8px;
  color: #cdd6f4;
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  backdrop-filter: blur(4px);
  line-height: 1;
}
.zoom-btn:hover {
  background: #313244;
  border-color: #cba6f7;
}

/* Tooltip for functions */
#fn-tooltip {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(17,17,27,0.9);
  border: 1px solid #313244;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11.5px;
  color: #7f849c;
  line-height: 1.8;
  pointer-events: none;
  backdrop-filter: blur(4px);
  display: none;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span class="logo-icon">∫</span>
    <h1>Graph Calculator</h1>
  </div>

  <div id="equations-list"></div>

  <button id="add-btn">+ Add Equation</button>

  <div id="hint-box">
    <strong>Functions:</strong> sin, cos, tan, sqrt, abs, ln, log, exp<br>
    <strong>Trig inv:</strong> asin, acos, atan<br>
    <strong>Constants:</strong> pi, e, tau<br>
    <strong>Power:</strong> x^2 &nbsp;|&nbsp; <strong>Abs:</strong> |x|<br>
    <strong>Scroll</strong> to zoom &nbsp;·&nbsp; <strong>Drag</strong> to pan
  </div>
</div>

<div id="graph-wrap">
  <canvas id="graph"></canvas>
  <div id="coords-display">x: 0.00, y: 0.00</div>
  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in"  title="Zoom in">+</button>
    <button class="zoom-btn" id="zoom-reset" title="Reset view">⊙</button>
    <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
  </div>
</div>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('graph');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('graph-wrap');

let view = { cx: 0, cy: 0, scale: 80 }; // scale = pixels per math unit
let equations = [];
let nextId = 0;

const PALETTE = [
  '#f38ba8', // red
  '#89b4fa', // blue
  '#a6e3a1', // green
  '#cba6f7', // mauve
  '#fab387', // peach
  '#f9e2af', // yellow
  '#89dceb', // sky
  '#94e2d5', // teal
];
let colorIdx = 0;

// ── Coordinate helpers ────────────────────────────────────────────────────────

function mathToScreen(mx, my) {
  const W = canvas.width, H = canvas.height;
  return [
    (mx - view.cx) * view.scale + W / 2,
    -((my - view.cy) * view.scale) + H / 2
  ];
}

function screenToMath(sx, sy) {
  const W = canvas.width, H = canvas.height;
  return [
    (sx - W / 2) / view.scale + view.cx,
    -((sy - H / 2) / view.scale) + view.cy
  ];
}

// ── Expression compiler ───────────────────────────────────────────────────────

function compile(expr) {
  const raw = expr.trim();
  if (!raw) return null;

  // Security: block dangerous identifiers
  const blocked = /\b(window|document|fetch|XMLHttpRequest|eval|Function|import|require|process|global|globalThis|self|location|navigator|this|prototype|constructor|__proto__|__defineGetter__|__lookupGetter__)\b/;
  if (blocked.test(raw)) throw new Error('Unsafe expression');

  // Strip optional "y = " prefix
  let e = raw.replace(/^\s*[yY]\s*=\s*/, '').trim();

  // Transform shortcuts
  e = e
    .replace(/\^/g, '**')                           // x^2 → x**2
    .replace(/(\d+\.?\d*)\s*x\b/g, '$1*x')          // 2x → 2*x
    .replace(/x\s*(\d+\.?\d*)/g, 'x*$1')            // x2 → x*2  (edge case)
    .replace(/(\d+\.?\d*)\s*\(/g, '$1*(')            // 2( → 2*(
    .replace(/\|([^|]+)\|/g, 'abs($1)');             // |x| → abs(x)

  const body = `
    "use strict";
    const pi = Math.PI, tau = 2*Math.PI, e = Math.E;
    const sin = Math.sin, cos = Math.cos, tan = Math.tan;
    const asin = Math.asin, acos = Math.acos, atan = Math.atan, atan2 = Math.atan2;
    const sinh = Math.sinh, cosh = Math.cosh, tanh = Math.tanh;
    const sqrt = Math.sqrt, cbrt = Math.cbrt, abs = Math.abs;
    const ln = Math.log, log = Math.log10, log2 = Math.log2;
    const exp = Math.exp, pow = Math.pow;
    const floor = Math.floor, ceil = Math.ceil, round = Math.round;
    const sign = Math.sign, max = Math.max, min = Math.min;
    const sec = v => 1/Math.cos(v);
    const csc = v => 1/Math.sin(v);
    const cot = v => 1/Math.tan(v);
    return (${e});
  `;

  const fn = new Function('x', body); // eslint-disable-line no-new-func

  // Smoke-test
  const t = fn(1);
  if (typeof t !== 'number') throw new Error('Expression must return a number');

  return fn;
}

// ── Grid helpers ──────────────────────────────────────────────────────────────

function niceStep(pixelsPerUnit) {
  // Target ~60-100 px between grid lines
  const raw = 70 / pixelsPerUnit;
  const pow10 = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const m of [1, 2, 5, 10]) {
    if (m * pow10 * pixelsPerUnit >= 50) return m * pow10;
  }
  return pow10 * 10;
}

function formatLabel(n, step) {
  if (n === 0) return '0';
  const decimals = Math.max(0, -Math.floor(Math.log10(step)));
  let s = n.toFixed(decimals);
  // Remove redundant trailing zeros for integers
  if (decimals === 0) return s;
  return parseFloat(s).toString();
}

// ── Render ────────────────────────────────────────────────────────────────────

function drawGraph() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(0, 0, W, H);

  drawGrid(W, H);
  drawAxes(W, H);

  for (const eq of equations) {
    if (!eq.visible || !eq.fn) continue;
    plotFunction(eq.fn, eq.color, W, H);
  }
}

function drawGrid(W, H) {
  const step = niceStep(view.scale);
  const [x0, y0] = screenToMath(0, 0);
  const [x1, y1] = screenToMath(W, H);

  const xStart = Math.ceil(x0 / step) * step;
  const yStart = Math.ceil(y1 / step) * step;

  ctx.strokeStyle = '#313244';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  // Vertical grid lines
  for (let x = xStart; x <= x1; x += step) {
    const [sx] = mathToScreen(x, 0);
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, H);
    ctx.stroke();
  }

  // Horizontal grid lines
  for (let y = yStart; y <= y0; y += step) {
    const [, sy] = mathToScreen(0, y);
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
  }

  // Labels
  ctx.fillStyle = '#585b70';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const [, axisYScreen] = mathToScreen(0, 0);
  const labelY = Math.min(H - 16, Math.max(4, axisYScreen + 4));

  for (let x = xStart; x <= x1; x += step) {
    if (Math.abs(x) < step * 0.01) continue;
    const [sx] = mathToScreen(x, 0);
    if (sx < 25 || sx > W - 10) continue;
    ctx.fillText(formatLabel(x, step), sx, labelY);
  }

  const [axisXScreen] = mathToScreen(0, 0);
  const labelX = Math.min(W - 30, Math.max(4, axisXScreen + 4));
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  for (let y = yStart; y <= y0; y += step) {
    if (Math.abs(y) < step * 0.01) continue;
    const [, sy] = mathToScreen(0, y);
    if (sy < 10 || sy > H - 10) continue;
    ctx.fillText(formatLabel(y, step), labelX, sy);
  }
}

function drawAxes(W, H) {
  const [ox, oy] = mathToScreen(0, 0);

  ctx.strokeStyle = '#585b70';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);

  // X axis
  ctx.beginPath();
  ctx.moveTo(0, oy);
  ctx.lineTo(W, oy);
  ctx.stroke();

  // Y axis
  ctx.beginPath();
  ctx.moveTo(ox, 0);
  ctx.lineTo(ox, H);
  ctx.stroke();

  // Origin label
  ctx.fillStyle = '#6c7086';
  ctx.font = '11px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  const lx = Math.min(W - 4, Math.max(15, ox - 4));
  const ly = Math.min(H - 16, Math.max(4, oy + 4));
  ctx.fillText('0', lx, ly);
}

function plotFunction(fn, color, W, H) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.setLineDash([]);
  ctx.beginPath();

  let prevSy = null;
  let prevMy = null;
  let drawing = false;

  for (let sx = 0; sx <= W; sx++) {
    const [mx] = screenToMath(sx, 0);
    let my;

    try {
      my = fn(mx);
    } catch {
      prevSy = null;
      prevMy = null;
      drawing = false;
      continue;
    }

    if (!isFinite(my) || isNaN(my)) {
      prevSy = null;
      prevMy = null;
      drawing = false;
      continue;
    }

    const [, sy] = mathToScreen(mx, my);

    // Detect discontinuities: if slope is huge and sign of slope flipped, break the path
    if (prevSy !== null) {
      const dy = Math.abs(sy - prevSy);
      const dmx = Math.abs(my - prevMy);
      if (dy > H * 1.5 || dmx > 1e8) {
        drawing = false;
      }
    }

    if (!drawing) {
      ctx.moveTo(sx, sy);
      drawing = true;
    } else {
      ctx.lineTo(sx, sy);
    }

    prevSy = sy;
    prevMy = my;
  }

  ctx.stroke();
}

// ── Sidebar UI ────────────────────────────────────────────────────────────────

function createEquation(initialExpr = '') {
  const id = nextId++;
  const color = PALETTE[colorIdx % PALETTE.length];
  colorIdx++;
  equations.push({ id, expr: initialExpr, color, fn: null, error: null, visible: true });
  rebuildEquationsList();
  if (initialExpr) {
    compileAndRender(id);
  }
  // Focus the new input
  setTimeout(() => {
    const inp = document.getElementById(`eq-input-${id}`);
    if (inp) inp.focus();
  }, 0);
}

function compileAndRender(id) {
  const eq = equations.find(e => e.id === id);
  if (!eq) return;
  try {
    eq.fn = compile(eq.expr);
    eq.error = null;
  } catch (err) {
    eq.fn = null;
    eq.error = err.message;
  }
  updateEqError(id);
  drawGraph();
}

function updateEqError(id) {
  const eq = equations.find(e => e.id === id);
  const el = document.getElementById(`eq-error-${id}`);
  if (!el || !eq) return;
  el.textContent = eq.error && eq.expr.trim() ? eq.error : '';
}

function rebuildEquationsList() {
  const list = document.getElementById('equations-list');
  list.innerHTML = '';

  for (const eq of equations) {
    const item = document.createElement('div');
    item.className = 'eq-item' + (eq.visible ? '' : ' hidden');
    item.id = `eq-item-${eq.id}`;
    item.style.setProperty('--eq-color', eq.color);

    item.innerHTML = `
      <div class="eq-swatch">
        <input type="color" value="${eq.color}" title="Change color" />
      </div>
      <div class="eq-body">
        <div class="eq-label">y =</div>
        <div class="eq-row">
          <input
            class="eq-input"
            id="eq-input-${eq.id}"
            type="text"
            value="${escHtml(eq.expr)}"
            placeholder="e.g. sin(x), x^2 + 1"
            autocomplete="off" autocorrect="off" spellcheck="false"
          />
        </div>
        <div class="eq-error" id="eq-error-${eq.id}"></div>
      </div>
      <div class="eq-actions">
        <button class="eq-vis-btn" title="Toggle visibility">${eq.visible ? '👁' : '🚫'}</button>
        <button class="eq-del-btn" title="Remove">✕</button>
      </div>
    `;

    const colorInput = item.querySelector('input[type=color]');
    colorInput.addEventListener('input', e => {
      eq.color = e.target.value;
      item.style.setProperty('--eq-color', eq.color);
      drawGraph();
    });

    const textInput = item.querySelector('.eq-input');
    textInput.addEventListener('input', e => {
      eq.expr = e.target.value;
      compileAndRender(eq.id);
    });
    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        createEquation();
      }
    });

    item.querySelector('.eq-vis-btn').addEventListener('click', () => {
      eq.visible = !eq.visible;
      item.classList.toggle('hidden', !eq.visible);
      item.querySelector('.eq-vis-btn').textContent = eq.visible ? '👁' : '🚫';
      drawGraph();
    });

    item.querySelector('.eq-del-btn').addEventListener('click', () => {
      equations = equations.filter(e => e.id !== eq.id);
      rebuildEquationsList();
      drawGraph();
    });

    list.appendChild(item);
    updateEqError(eq.id);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Resize ────────────────────────────────────────────────────────────────────

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  drawGraph();
}

window.addEventListener('resize', resizeCanvas);

// ── Zoom & Pan ────────────────────────────────────────────────────────────────

let drag = null;

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const [mx, my] = screenToMath(sx, sy);

  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  view.scale *= factor;
  view.scale = Math.min(Math.max(view.scale, 2), 50000);

  // Keep mouse position fixed
  const [nx, ny] = screenToMath(sx, sy);
  view.cx += mx - nx;
  view.cy += my - ny;

  drawGraph();
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  drag = { sx: e.clientX, sy: e.clientY, cx: view.cx, cy: view.cy };
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  // Coords display
  const [mx, my] = screenToMath(sx, sy);
  document.getElementById('coords-display').textContent =
    `x: ${mx.toFixed(3)}, y: ${my.toFixed(3)}`;

  if (drag) {
    const dx = (e.clientX - drag.sx) / view.scale;
    const dy = (e.clientY - drag.sy) / view.scale;
    view.cx = drag.cx - dx;
    view.cy = drag.cy + dy;
    drawGraph();
  }
});

window.addEventListener('mouseup', () => {
  drag = null;
  canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('coords-display').textContent = '';
});

// ── Zoom buttons ──────────────────────────────────────────────────────────────

document.getElementById('zoom-in').addEventListener('click', () => {
  view.scale *= 1.4;
  view.scale = Math.min(view.scale, 50000);
  drawGraph();
});

document.getElementById('zoom-out').addEventListener('click', () => {
  view.scale /= 1.4;
  view.scale = Math.max(view.scale, 2);
  drawGraph();
});

document.getElementById('zoom-reset').addEventListener('click', () => {
  view = { cx: 0, cy: 0, scale: 80 };
  drawGraph();
});

// ── Add equation button ───────────────────────────────────────────────────────

document.getElementById('add-btn').addEventListener('click', () => createEquation());

// ── Init ──────────────────────────────────────────────────────────────────────

resizeCanvas();
createEquation('sin(x)');
createEquation('x^2 / 4');
</script>
</body>
</html>
